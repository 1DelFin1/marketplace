services:
  user_service:
    build:
      context: ./user-service
      dockerfile: ./Dockerfile
    env_file:
      - ./user-service/.env
    depends_on:
      user_db:
        condition: service_healthy
    networks:
      - backend_network
    ports:
      - "8000:8000"

  product_service:
    build:
      context: ./product-service
      dockerfile: ./Dockerfile
    env_file:
      - ./product-service/.env
    depends_on:
      product_db:
        condition: service_healthy
    networks:
      - backend_network
    ports:
      - "8001:8001"

  order_service:
    build:
      context: ./order-service
      dockerfile: ./Dockerfile
    env_file:
      - ./order-service/.env
    depends_on:
      order_db:
        condition: service_healthy
    networks:
      - backend_network
    ports:
      - "8002:8002"

  review_service:
    build:
      context: ./review-service
      dockerfile: ./Dockerfile
    env_file:
      - ./review-service/.env
    depends_on:
      review_db:
        condition: service_healthy
    networks:
      - backend_network
    ports:
      - "8003:8003"

  user_db:
    image: "postgres:17"
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${USER_DB_USER}
      POSTGRES_PASSWORD: ${USER_DB_PASSWORD}
      POSTGRES_DB: ${USER_DB_NAME}
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${USER_DB_USER} -d ${USER_DB_NAME}" ]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - user_pgdata:/var/lib/postgresql/data
    networks:
      - backend_network

  product_db:
    image: "postgres:17"
    restart: always
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: ${PRODUCT_DB_USER}
      POSTGRES_PASSWORD: ${PRODUCT_DB_PASSWORD}
      POSTGRES_DB: ${PRODUCT_DB_NAME}
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${PRODUCT_DB_USER} -d ${PRODUCT_DB_NAME}" ]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - product_pgdata:/var/lib/postgresql/data
    networks:
      - backend_network

  order_db:
    image: "postgres:17"
    restart: always
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: ${ORDER_DB_USER}
      POSTGRES_PASSWORD: ${ORDER_DB_PASSWORD}
      POSTGRES_DB: ${ORDER_DB_NAME}
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${ORDER_DB_USER} -d ${ORDER_DB_NAME}" ]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - order_pgdata:/var/lib/postgresql/data
    networks:
      - backend_network

  review_db:
    image: "postgres:17"
    restart: always
    ports:
      - "5435:5432"
    environment:
      POSTGRES_USER: ${REVIEW_DB_USER}
      POSTGRES_PASSWORD: ${REVIEW_DB_PASSWORD}
      POSTGRES_DB: ${REVIEW_DB_NAME}
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${REVIEW_DB_USER} -d ${REVIEW_DB_NAME}" ]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - review_pgdata:/var/lib/postgresql/data
    networks:
      - backend_network

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    hostname: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_USER}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASSWORD}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - backend_network
    healthcheck:
      test: [ "CMD", "rabbitmqctl", "status" ]
      interval: 10s
      timeout: 10s
      retries: 5

  nginx_gateway:
    image: nginx:alpine
    container_name: nginx_gateway
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - user_service
      - product_service
      - order_service
      - review_service
    networks:
      - backend_network
    restart: unless-stopped

  minio:
    image: minio/minio
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET}
    command: server /data --console-address ":9001"
    restart: unless-stopped
    networks:
      - backend_network

  redis:
    image: redis:7-alpine
    container_name: my_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - backend_network

